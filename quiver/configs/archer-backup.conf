    "$CONFIG_DIR/gtkrc"
    "$CONFIG_DIR/gtkrc-2.0"
    "$CONFIG_DIR/kate"
    "$CONFIG_DIR/katerc"
    "$CONFIG_DIR/kcminputrc"
    "$CONFIG_DIR/kdeglobals"
    "$CONFIG_DIR/kglobalshortcutsrc"
    "$CONFIG_DIR/khotkeysrc"
