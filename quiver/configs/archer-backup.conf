# archer-backup configuration file
# Any array named _INCLUDE will be checked
# Paths can be both files and directories

NAME="Archer"

# Common paths
CONFIG_DIR="$HOME/.config"
BIN_DIR="$HOME/.local/bin"
SHARE_DIR="$HOME/.local/share"

HOME_INCLUDE=(
    "$HOME/.fonts"
    "$HOME/.icons"
    "$HOME/.themes"
)

SHARE_INCLUDE=(
    "$SHARE_DIR/aurorae"
