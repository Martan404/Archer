    "$SHARE_DIR/fonts"
    "$SHARE_DIR/icons"
    "$SHARE_DIR/konsole"
    "$SHARE_DIR/kwin"
    "$SHARE_DIR/plasma"
    "$SHARE_DIR/wallpapers"
)

CONFIG_INCLUDE=(
    "$CONFIG_DIR/Kvantum"
